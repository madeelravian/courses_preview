    <main>
      <!-- <section class="section section-intro" aria-label="Highlights">
        <article class="info-card">
          <span class="info-kicker">Beautiful by default</span>

      <section class="section section-courses" id="courses">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Library</p>
            <h2>Available course previews</h2>
          </div>
          <!-- <p class="section-caption">Point each entry at a public R2 URL and the page will render it automatically.</p> -->
        </div>

        <div class="toolbar" aria-label="Course filters">
          <label class="search-field" for="searchInput">
            <span>Search courses</span>
            <input id="searchInput" type="search" placeholder="Search by title, description, or tag">
          </label>
          <p class="results-count" id="resultsCount" aria-live="polite">Loading courses...</p>
        </div>

        <div class="course-grid" id="courseGrid" aria-live="polite"></div>
        <template id="courseCardTemplate">
          <article class="course-card">
            <div class="course-card-top">
              <span class="course-type"></span>
              <h3 class="course-title"></h3>
              <p class="course-description"></p>
            </div>
            <div class="course-tags"></div>
            <div class="course-card-footer">
              <div class="course-meta"></div>
              <button class="button button-card" type="button">Watch preview</button>
            </div>
          </article>
        </template>
      </section>
    </main>
  </div>

  <div class="modal" id="previewModal" hidden>
    <div class="modal-backdrop" data-close-modal="true"></div>
    <section
      class="modal-panel"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modalTitle"
      aria-describedby="modalDescription"
    >
      <button class="modal-close" id="modalCloseButton" type="button" aria-label="Close preview">Close</button>
      <div class="modal-copy">
        <p class="eyebrow">Course preview</p>
        <h3 id="modalTitle"></h3>
        <p id="modalDescription" class="modal-description"></p>
      </div>
      <div class="modal-video-shell">
        <video id="previewVideo" class="modal-video" controls playsinline preload="metadata"></video>
      </div>
    </section>
  </div>

  <script src="app.js" defer></script>
</body>
